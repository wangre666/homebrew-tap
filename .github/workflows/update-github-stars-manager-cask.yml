name: Update GitHub Stars Manager cask

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, for example 0.5.4. Leave empty to use the latest GitHub release."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cask:
    runs-on: ubuntu-latest
    env:
      CASK_FILE: Casks/github-stars-manager.rb
      INDEX_FILE: index.html
      UPSTREAM_REPO: AmintaCCCP/GithubStarsManager
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out tap
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          requested_version="${{ inputs.version }}"
          if [[ -z "$requested_version" ]]; then
            requested_version="$(gh release view --repo "$UPSTREAM_REPO" --json tagName --jq '.tagName')"
          fi

          version="${requested_version#v}"
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+)*([.-][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid version: $requested_version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(grep -m1 'version "' "$CASK_FILE" | sed 's/.*version "\(.*\)"/\1/')"
          upstream_version="${{ steps.version.outputs.version }}"

          if [[ "$current_version" == "$upstream_version" ]]; then
            echo "Cask is already up to date (v$current_version)."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Update needed: v$current_version -> v$upstream_version"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets and calculate hashes
        id: hashes
        if: steps.check.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          tag="${{ steps.version.outputs.tag }}"
          base_url="https://github.com/$UPSTREAM_REPO/releases/download/$tag"
          intel_asset="GitHub.Stars.Manager-$version.dmg"
          arm_asset="GitHub.Stars.Manager-$version-arm64.dmg"

          curl --fail --location --retry 3 --output "$intel_asset" "$base_url/$intel_asset"
          curl --fail --location --retry 3 --output "$arm_asset" "$base_url/$arm_asset"

          intel_sha="$(sha256sum "$intel_asset" | awk '{print $1}')"
          arm_sha="$(sha256sum "$arm_asset" | awk '{print $1}')"

          echo "intel_sha=$intel_sha" >> "$GITHUB_OUTPUT"
          echo "arm_sha=$arm_sha" >> "$GITHUB_OUTPUT"

      - name: Update cask
        if: steps.check.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          cask_file = ENV.fetch("CASK_FILE")
          version = ENV.fetch("VERSION")
          intel_sha = ENV.fetch("INTEL_SHA")
          arm_sha = ENV.fetch("ARM_SHA")

          def replace!(content, pattern, replacement)
            abort("Could not update cask: pattern did not match #{pattern.inspect}") unless content.match?(pattern)
            content.sub(pattern, replacement)
          end

          content = File.read(cask_file)
          content = replace!(content, /version "[^"]+"/, %(version "#{version}"))
          content = replace!(
            content,
            /(on_intel do.*?sha256 ")[0-9a-f]{64}(".*?end)/m,
            "\\1#{intel_sha}\\2"
          )
          content = replace!(
            content,
            /(on_arm do.*?sha256 ")[0-9a-f]{64}(".*?end)/m,
            "\\1#{arm_sha}\\2"
          )

          File.write(cask_file, content)
          RUBY
        env:
          VERSION: ${{ steps.version.outputs.version }}
          INTEL_SHA: ${{ steps.hashes.outputs.intel_sha }}
          ARM_SHA: ${{ steps.hashes.outputs.arm_sha }}

      - name: Validate cask syntax
        if: steps.check.outputs.needed == 'true'
        shell: bash
        run: ruby -c "$CASK_FILE"

      - name: Update HTML catalog snapshot
        if: steps.check.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          require "json"

          index_file = ENV.fetch("INDEX_FILE")
          localized_descriptions = {
            "github-stars-manager" => {
              "zh" => "由 AI 驱动的 GitHub Stars 管理工具，支持语义搜索和发布跟踪",
            },
          }

          def interpolate(template, version)
            template
              .gsub('#{version}', version)
              .gsub('v#{version}', "v#{version}")
          end

          def parse_cask(path, localized_descriptions)
            source = File.read(path)
            token = source[/cask\s+"([^"]+)"/, 1]
            abort("Could not parse cask token from #{path}") unless token

            version = source[/version\s+"([^"]+)"/, 1] || "unknown"
            architectures = source.scan(/on_(intel|arm)\s+do([\s\S]*?)\n\s*end/).map do |arch, block|
              url = block[/url\s+"([^"]+)"/, 1] || ""
              sha256 = block[/sha256\s+"([^"]+)"/, 1] || ""

              {
                "name" => arch == "arm" ? "Apple Silicon" : "Intel",
                "url" => interpolate(url, version),
                "sha256" => sha256,
              }
            end

            if architectures.empty?
              url = source[/\n\s*url\s+"([^"]+)"/, 1] || ""
              sha256 = source[/\n\s*sha256\s+"([^"]+)"/, 1] || ""
              architectures << {
                "name" => "Universal",
                "url" => interpolate(url, version),
                "sha256" => sha256,
              } if !url.empty? || !sha256.empty?
            end

            item = {
              "type" => "cask",
              "token" => token,
              "version" => version,
              "name" => source[/\n\s*name\s+"([^"]+)"/, 1] || token,
              "desc" => source[/\n\s*desc\s+"([^"]+)"/, 1] || "",
              "homepage" => source[/\n\s*homepage\s+"([^"]+)"/, 1] || "",
              "app" => source[/\n\s*app\s+"([^"]+)"/, 1] || "",
              "architectures" => architectures,
            }

            desc_zh = localized_descriptions.dig(token, "zh")
            item["descZh"] = desc_zh if desc_zh
            item
          end

          snapshot = Dir["Casks/*.rb"]
            .map { |path| parse_cask(path, localized_descriptions) }
            .sort_by { |item| item.fetch("token") }
          latest = snapshot.find { |item| item["version"] && item["version"] != "unknown" }&.fetch("version", nil) || "-"

          content = File.read(index_file)
          snapshot_js = "      const SNAPSHOT = #{JSON.pretty_generate(snapshot).gsub(/^/, '      ').sub(/\A\s+/, '')};"

          unless content.match?(/      const SNAPSHOT = \[\n.*?\n      \];/m)
            abort("Could not update HTML catalog: SNAPSHOT block was not found")
          end

          content = content.sub(/      const SNAPSHOT = \[\n.*?\n      \];/m, snapshot_js)
          content = content.sub(
            /(<span class="board-value" id="updatedCount">)[^<]*(<\/span>)/,
            "\\1#{latest}\\2"
          )

          File.write(index_file, content)
          RUBY

      - name: Push update branch and open PR
        if: steps.check.outputs.needed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          branch="update/github-stars-manager-v$version"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --create "$branch"
          git add "$CASK_FILE" "$INDEX_FILE"
          git commit -m "Update github-stars-manager cask and catalog to v$version"

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch origin "refs/heads/$branch:refs/remotes/origin/$branch"
            remote_sha="$(git rev-parse "refs/remotes/origin/$branch")"
            git push --force-with-lease="refs/heads/$branch:$remote_sha" origin "HEAD:refs/heads/$branch"
          else
            git push origin "HEAD:refs/heads/$branch"
          fi

          if gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" --json number --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "PR already exists for $branch, skipping."
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$branch" \
              --title "Update github-stars-manager cask to v$version" \
              --body "Updates the GitHub Stars Manager cask to v$version, refreshes both Intel and Apple Silicon sha256 values, and updates the GitHub Pages catalog snapshot."
          fi
