<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Homebrew Tap Catalog</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23151614'/%3E%3Cpath d='M16 18h32v8H16zM20 30h24v16H20z' fill='%23f4f7f1'/%3E%3Cpath d='M26 10h12v8H26z' fill='%231c7657'/%3E%3C/svg%3E"
    />
    <meta
      name="description"
      content="A GitHub Pages catalog for the Homebrew tap packages in this repository."
    />
    <style>
      :root {
        color-scheme: light;
        --paper: #f4f7f1;
        --ink: #151614;
        --muted: #5a6257;
        --line: #c8d2bf;
        --panel: #ffffff;
        --panel-alt: #edf3e8;
        --green: #1c7657;
        --green-dark: #0f523b;
        --red: #c7412f;
        --gold: #b17917;
        --code: #20251f;
        --shadow: 0 18px 50px rgba(29, 42, 26, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(90deg, rgba(21, 22, 20, 0.045) 1px, transparent 1px) 0 0 /
            48px 48px,
          linear-gradient(rgba(21, 22, 20, 0.035) 1px, transparent 1px) 0 0 /
            48px 48px,
          radial-gradient(circle at 78% 16%, rgba(199, 65, 47, 0.18), transparent 28rem),
          var(--paper);
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(1160px, calc(100% - 32px));
        margin: 0 auto;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 390px);
        gap: 32px;
        align-items: end;
        min-height: clamp(500px, 82vh, 760px);
        padding: 32px 0 42px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 0 0;
      }

      .mark {
        display: inline-grid;
        grid-template-columns: 34px auto;
        gap: 10px;
        align-items: center;
        font-weight: 800;
        letter-spacing: 0;
      }

      .mark-sign {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 2px solid var(--ink);
        background: var(--green);
        color: #fff;
        box-shadow: 4px 4px 0 var(--ink);
      }

      .repo-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid var(--ink);
        background: rgba(255, 255, 255, 0.62);
        text-decoration: none;
        font-weight: 700;
        box-shadow: 3px 3px 0 var(--ink);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .repo-link:hover {
        transform: translate(-2px, -2px);
        box-shadow: 5px 5px 0 var(--ink);
      }

      .hero-copy {
        align-self: center;
        padding-top: 46px;
      }

      .eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 18px;
        color: var(--green-dark);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 46px;
        height: 3px;
        background: var(--red);
      }

      h1 {
        max-width: 820px;
        margin: 0;
        font-family: Georgia, "Songti SC", serif;
        font-size: clamp(3.4rem, 10vw, 8.7rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 0.9;
      }

      .hero-text {
        max-width: 690px;
        margin: 26px 0 0;
        color: var(--muted);
        font-size: clamp(1.02rem, 2vw, 1.24rem);
      }

      .install-strip {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
        width: min(720px, 100%);
        margin-top: 34px;
        border: 2px solid var(--ink);
        background: var(--code);
        color: #f8fff4;
        box-shadow: 8px 8px 0 var(--green);
      }

      .install-strip span {
        padding: 0 0 0 16px;
        color: #9bd7bd;
        font-size: 0.82rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .install-strip code {
        overflow-x: auto;
        padding: 16px 0;
        white-space: nowrap;
        font: 700 0.95rem "SFMono-Regular", Consolas, monospace;
      }

      .copy-button {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        margin-right: 2px;
        border: 0;
        border-left: 1px solid rgba(255, 255, 255, 0.18);
        background: transparent;
        color: #f8fff4;
        cursor: pointer;
      }

      .copy-button svg {
        width: 19px;
        height: 19px;
      }

      .stats-board {
        position: relative;
        align-self: center;
        border: 2px solid var(--ink);
        background: var(--panel);
        box-shadow: var(--shadow), 10px 10px 0 var(--ink);
      }

      .stats-board::before {
        content: "";
        position: absolute;
        inset: -18px 26px auto auto;
        width: 86px;
        height: 34px;
        border: 2px solid var(--ink);
        background: var(--red);
        transform: rotate(5deg);
      }

      .board-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 24px;
        align-items: baseline;
        padding: 24px;
        border-bottom: 1px solid var(--line);
      }

      .board-row:last-child {
        border-bottom: 0;
      }

      .board-label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .board-value {
        font-family: Georgia, "Songti SC", serif;
        font-size: clamp(2.1rem, 5vw, 4.5rem);
        font-weight: 900;
        line-height: 0.9;
      }

      .catalog {
        padding: 18px 0 72px;
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h2 {
        margin: 0;
        font-family: Georgia, "Songti SC", serif;
        font-size: clamp(2rem, 4.8vw, 4.7rem);
        letter-spacing: 0;
        line-height: 0.95;
      }

      .status {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
        text-align: right;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 330px), 1fr));
        gap: 18px;
      }

      .card {
        display: grid;
        gap: 18px;
        min-height: 100%;
        padding: 22px;
        border: 2px solid var(--ink);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 6px 6px 0 rgba(21, 22, 20, 0.92);
      }

      .card-head {
        display: grid;
        grid-template-columns: 52px 1fr;
        gap: 14px;
        align-items: start;
      }

      .app-icon {
        display: grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border: 2px solid var(--ink);
        border-radius: 8px;
        background: var(--panel-alt);
        color: var(--green-dark);
      }

      .app-icon svg {
        width: 28px;
        height: 28px;
      }

      .token {
        margin: 2px 0 0;
        color: var(--green-dark);
        font: 800 0.78rem "SFMono-Regular", Consolas, monospace;
        overflow-wrap: anywhere;
      }

      h3 {
        margin: 0;
        font-size: clamp(1.35rem, 3vw, 2.1rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .desc {
        margin: 0;
        color: var(--muted);
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .meta-box {
        min-width: 0;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #f8faf6;
      }

      .meta-box b {
        display: block;
        color: var(--muted);
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .meta-box span {
        display: block;
        margin-top: 6px;
        font-weight: 900;
        overflow-wrap: anywhere;
      }

      .arch-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .arch-list li {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        align-items: center;
        min-width: 0;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-alt);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 64px;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--ink);
        border-radius: 999px;
        background: var(--gold);
        color: #fff;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .sha {
        min-width: 0;
        font: 700 0.76rem "SFMono-Regular", Consolas, monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .action-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 13px;
        border: 1px solid var(--ink);
        border-radius: 6px;
        background: var(--ink);
        color: #fff;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 800;
      }

      .action-link.secondary {
        background: #fff;
        color: var(--ink);
      }

      .action-link svg {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
      }

      .empty {
        padding: 30px;
        border: 2px dashed var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.62);
        color: var(--muted);
        font-weight: 700;
      }

      .footer {
        padding: 24px 0 42px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 780px) {
        .hero {
          grid-template-columns: 1fr;
          min-height: auto;
          padding-bottom: 28px;
        }

        .topbar,
        .section-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .hero-copy {
          padding-top: 22px;
        }

        .install-strip {
          grid-template-columns: 1fr auto;
        }

        .install-strip span {
          grid-column: 1 / -1;
          padding: 12px 16px 0;
        }

        .install-strip code {
          padding: 0 0 14px 16px;
        }

        .stats-board {
          width: 100%;
        }

        .status {
          text-align: left;
        }

        .meta {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .hero-copy,
        .stats-board,
        .card {
          animation: rise 620ms ease both;
        }

        .stats-board {
          animation-delay: 90ms;
        }

        .card {
          animation-delay: calc(var(--i, 0) * 70ms + 140ms);
        }

        @keyframes rise {
          from {
            opacity: 0;
            transform: translateY(18px);
          }

          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }
    </style>
  </head>
  <body>
    <header class="shell topbar">
      <div class="mark" aria-label="Homebrew tap">
        <span class="mark-sign">tap</span>
        <span>homebrew-tap</span>
      </div>
      <a class="repo-link" id="repoLink" href="https://github.com/wangre666/homebrew-tap">
        <span>GitHub</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M14 4h6v6h-2V7.41l-8.29 8.3-1.42-1.42 8.3-8.29H14V4ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"
            fill="currentColor"
          />
        </svg>
      </a>
    </header>

    <main>
      <section class="shell hero" aria-labelledby="pageTitle">
        <div class="hero-copy">
          <p class="eyebrow">Homebrew Cask Registry</p>
          <h1 id="pageTitle">Tap Catalog</h1>
          <p class="hero-text">
            当前仓库提供的软件、版本、安装命令和架构校验信息。
          </p>
          <div class="install-strip">
            <span>Install</span>
            <code id="tapCommand">brew tap wangre666/tap</code>
            <button class="copy-button" type="button" id="copyTap" aria-label="Copy tap command">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M8 7V5a3 3 0 0 1 3-3h7a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3h-2v4a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-9a3 3 0 0 1 3-3h2Zm2 0h3a3 3 0 0 1 3 3v3h2a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-7a1 1 0 0 0-1 1v2Zm-4 2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-9a1 1 0 0 0-1-1H6Z"
                  fill="currentColor"
                />
              </svg>
            </button>
          </div>
        </div>

        <aside class="stats-board" aria-label="Tap statistics">
          <div class="board-row">
            <span class="board-label">Packages</span>
            <span class="board-value" id="packageCount">1</span>
          </div>
          <div class="board-row">
            <span class="board-label">Casks</span>
            <span class="board-value" id="caskCount">1</span>
          </div>
          <div class="board-row">
            <span class="board-label">Latest</span>
            <span class="board-value" id="updatedCount">0.5.5</span>
          </div>
        </aside>
      </section>

      <section class="shell catalog" aria-labelledby="catalogTitle">
        <div class="section-head">
          <h2 id="catalogTitle">Available Software</h2>
          <div class="status" id="statusText">Snapshot from this repository.</div>
        </div>
        <div class="grid" id="catalogGrid"></div>
      </section>
    </main>

    <footer class="shell footer">
      <span id="footerText">Published from wangre666/homebrew-tap.</span>
    </footer>

    <script>
      const SNAPSHOT = [
        {
          type: "cask",
          token: "github-stars-manager",
          version: "0.5.5",
          name: "GitHub Stars Manager",
          desc: "AI-powered GitHub Stars organizer with semantic search and release tracking",
          homepage: "https://github.com/AmintaCCCP/GithubStarsManager",
          app: "GitHub Stars Manager.app",
          architectures: [
            {
              name: "Intel",
              url: "https://github.com/AmintaCCCP/GithubStarsManager/releases/download/v0.5.5/GitHub.Stars.Manager-0.5.5.dmg",
              sha256: "8ae2fccc03c044a776d6fa295412425eda172a47c1c3c47d46b25e9881d6fc5f",
            },
            {
              name: "Apple Silicon",
              url: "https://github.com/AmintaCCCP/GithubStarsManager/releases/download/v0.5.5/GitHub.Stars.Manager-0.5.5-arm64.dmg",
              sha256: "9aa7ed8491aaac6844922bbcdd603af299a3d095acd0f0279a3ead46ba14b2dd",
            },
          ],
        },
      ];

      const DEFAULT_REPO = {
        owner: "wangre666",
        repo: "homebrew-tap",
        branch: "main",
      };

      const grid = document.querySelector("#catalogGrid");
      const statusText = document.querySelector("#statusText");
      const repoLink = document.querySelector("#repoLink");
      const tapCommand = document.querySelector("#tapCommand");
      const copyTap = document.querySelector("#copyTap");
      const footerText = document.querySelector("#footerText");

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          }[char];
        });
      }

      function detectRepo() {
        const hostMatch = window.location.hostname.match(/^([^.]+)\.github\.io$/);
        const pathRepo = window.location.pathname.split("/").filter(Boolean)[0];
        if (hostMatch && pathRepo) {
          return { owner: hostMatch[1], repo: pathRepo, branch: DEFAULT_REPO.branch };
        }
        return DEFAULT_REPO;
      }

      function interpolate(template, version) {
        return template
          .replaceAll("#{version}", version)
          .replaceAll("v#{version}", `v${version}`);
      }

      function parseCask(source) {
        const token = source.match(/cask\s+"([^"]+)"/)?.[1];
        if (!token) return null;

        const version = source.match(/version\s+"([^"]+)"/)?.[1] ?? "unknown";
        const name = source.match(/\n\s*name\s+"([^"]+)"/)?.[1] ?? token;
        const desc = source.match(/\n\s*desc\s+"([^"]+)"/)?.[1] ?? "";
        const homepage = source.match(/\n\s*homepage\s+"([^"]+)"/)?.[1] ?? "";
        const app = source.match(/\n\s*app\s+"([^"]+)"/)?.[1] ?? "";
        const architectures = [];

        for (const match of source.matchAll(/on_(intel|arm)\s+do([\s\S]*?)\n\s*end/g)) {
          const archName = match[1] === "arm" ? "Apple Silicon" : "Intel";
          const block = match[2];
          const url = block.match(/url\s+"([^"]+)"/)?.[1] ?? "";
          const sha256 = block.match(/sha256\s+"([^"]+)"/)?.[1] ?? "";
          architectures.push({
            name: archName,
            url: interpolate(url, version),
            sha256,
          });
        }

        if (!architectures.length) {
          const url = source.match(/\n\s*url\s+"([^"]+)"/)?.[1] ?? "";
          const sha256 = source.match(/\n\s*sha256\s+"([^"]+)"/)?.[1] ?? "";
          if (url || sha256) {
            architectures.push({
              name: "Universal",
              url: interpolate(url, version),
              sha256,
            });
          }
        }

        return { type: "cask", token, version, name, desc, homepage, app, architectures };
      }

      async function loadFromGitHub(repoInfo) {
        const api = `https://api.github.com/repos/${repoInfo.owner}/${repoInfo.repo}/contents/Casks?ref=${repoInfo.branch}`;
        const response = await fetch(api, { headers: { Accept: "application/vnd.github+json" } });
        if (!response.ok) throw new Error(`GitHub API returned ${response.status}`);

        const files = (await response.json()).filter((file) => file.name.endsWith(".rb"));
        const casks = await Promise.all(
          files.map(async (file) => {
            const rawUrl = `https://raw.githubusercontent.com/${repoInfo.owner}/${repoInfo.repo}/${repoInfo.branch}/${file.path}`;
            const rawResponse = await fetch(rawUrl);
            if (!rawResponse.ok) throw new Error(`Could not fetch ${file.path}`);
            return parseCask(await rawResponse.text());
          })
        );

        return casks.filter(Boolean).sort((a, b) => a.token.localeCompare(b.token));
      }

      function updateChrome(repoInfo, items) {
        const tap = repoInfo.repo.replace(/^homebrew-/, "");
        const command = `brew tap ${repoInfo.owner}/${tap}`;
        const newest = items.find((item) => item.version && item.version !== "unknown")?.version ?? "-";

        repoLink.href = `https://github.com/${repoInfo.owner}/${repoInfo.repo}`;
        tapCommand.textContent = command;
        footerText.textContent = `Published from ${repoInfo.owner}/${repoInfo.repo}.`;
        document.querySelector("#packageCount").textContent = String(items.length);
        document.querySelector("#caskCount").textContent = String(
          items.filter((item) => item.type === "cask").length
        );
        document.querySelector("#updatedCount").textContent = newest;
      }

      function render(items, repoInfo) {
        updateChrome(repoInfo, items);

        if (!items.length) {
          grid.innerHTML = '<div class="empty">No casks found in this tap.</div>';
          return;
        }

        grid.innerHTML = items
          .map((item, index) => {
            const install = `brew install --cask ${repoInfo.owner}/${repoInfo.repo.replace(
              /^homebrew-/,
              ""
            )}/${item.token}`;
            const archRows = item.architectures
              .map(
                (arch) => `
                  <li title="${escapeHtml(arch.sha256)}">
                    <span class="chip">${escapeHtml(arch.name)}</span>
                    <span class="sha">${escapeHtml(arch.sha256 || "sha256 not set")}</span>
                  </li>
                `
              )
              .join("");

            return `
              <article class="card" style="--i: ${index}">
                <div class="card-head">
                  <div class="app-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M8.2 5.1 12 2l3.8 3.1 4.8.8.8 4.8L24 14.5l-2.6 3.8-.8 4.8-4.8.8L12 27l-3.8-3.1-4.8-.8-.8-4.8L0 14.5l2.6-3.8.8-4.8 4.8-.8Z" transform="scale(.86) translate(2 1)" fill="currentColor" opacity=".16"/>
                      <path d="M12 3 4 7v10l8 4 8-4V7l-8-4Zm0 2.24L17.76 8 12 10.76 6.24 8 12 5.24ZM6 9.62l5 2.4v6.46l-5-2.5V9.62Zm7 8.86v-6.46l5-2.4v6.36l-5 2.5Z" fill="currentColor"/>
                    </svg>
                  </div>
                  <div>
                    <h3>${escapeHtml(item.name)}</h3>
                    <p class="token">${escapeHtml(item.token)}</p>
                  </div>
                </div>
                <p class="desc">${escapeHtml(item.desc)}</p>
                <div class="meta">
                  <div class="meta-box">
                    <b>Version</b>
                    <span>${escapeHtml(item.version)}</span>
                  </div>
                  <div class="meta-box">
                    <b>Artifact</b>
                    <span>${escapeHtml(item.app || item.type)}</span>
                  </div>
                </div>
                <ul class="arch-list">${archRows}</ul>
                <div class="install-strip">
                  <span>Install</span>
                  <code>${escapeHtml(install)}</code>
                  <button class="copy-button package-copy" type="button" data-command="${escapeHtml(
                    install
                  )}" aria-label="Copy install command">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M8 7V5a3 3 0 0 1 3-3h7a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3h-2v4a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3v-9a3 3 0 0 1 3-3h2Zm2 0h3a3 3 0 0 1 3 3v3h2a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1h-7a1 1 0 0 0-1 1v2Zm-4 2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-9a1 1 0 0 0-1-1H6Z" fill="currentColor"/>
                    </svg>
                  </button>
                </div>
                <div class="actions">
                  ${
                    item.homepage
                      ? `<a class="action-link" href="${escapeHtml(item.homepage)}">
                          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 4h6v6h-2V7.41l-8.29 8.3-1.42-1.42 8.3-8.29H14V4ZM5 5h6v2H7v10h10v-4h2v6H5V5Z" fill="currentColor"/></svg>
                          Homepage
                        </a>`
                      : ""
                  }
                  <a class="action-link secondary" href="https://github.com/${escapeHtml(
                    repoInfo.owner
                  )}/${escapeHtml(repoInfo.repo)}/blob/${escapeHtml(
              repoInfo.branch
            )}/Casks/${escapeHtml(item.token)}.rb">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6Zm-1 2.5L17.5 9H13V4.5ZM8 13h8v2H8v-2Zm0 4h8v2H8v-2Z" fill="currentColor"/></svg>
                    Cask
                  </a>
                </div>
              </article>
            `;
          })
          .join("");

        document.querySelectorAll(".package-copy").forEach((button) => {
          button.addEventListener("click", () => copyCommand(button.dataset.command, button));
        });
      }

      async function copyCommand(command, button) {
        try {
          await navigator.clipboard.writeText(command);
          const previous = button.getAttribute("aria-label");
          button.setAttribute("aria-label", "Copied");
          setTimeout(() => button.setAttribute("aria-label", previous), 1200);
        } catch {
          window.prompt("Copy command", command);
        }
      }

      copyTap.addEventListener("click", () => copyCommand(tapCommand.textContent, copyTap));

      async function boot() {
        const repoInfo = detectRepo();
        render(SNAPSHOT, repoInfo);

        try {
          const liveItems = await loadFromGitHub(repoInfo);
          render(liveItems, repoInfo);
          statusText.textContent = `Live from ${repoInfo.owner}/${repoInfo.repo}.`;
        } catch (error) {
          statusText.textContent = "Snapshot from this repository.";
          console.warn(error);
        }
      }

      boot();
    </script>
  </body>
</html>
